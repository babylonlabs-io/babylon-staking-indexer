name: ci

on:
  pull_request:
    branches:
    - '**'

permissions:
  contents: read

jobs:
  lint_test:
    uses: babylonlabs-io/.github/.github/workflows/reusable_go_lint_test.yml@5237008234bd9c3b62968a1fbe6ab543b2256f60  # v0.14.3
    with:
      go-version: '1.25.5'
      go-lint-version: 'v2.7.2'
      run-unit-tests: true
      run-integration-tests: true
      run-lint: true
      run-build: true
      run-gosec: true
      gosec-args: "-no-fail ./..."

  docker_pipeline:
    permissions:
      contents: read         # Required by reusable workflow
      id-token: write        # Required for AWS OIDC
      security-events: write # Required for Trivy SARIF uploads
    uses: babylonlabs-io/.github/.github/workflows/reusable_docker_pipeline.yml@d2299e834fcbaca4bf2db043a2939798043d5951 # v0.16.1
    secrets: inherit
    with:
      publish: false
      dockerfile: ./contrib/images/babylon-staking-indexer/Dockerfile
